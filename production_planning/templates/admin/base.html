{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Quản lý hệ thống</title>
    <!-- Global stylesheets -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,300,100,500,700,900" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/icons/icomoon/styles.min.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/bootstrap_limitless.min.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/layout.min.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/components.min.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'admin/css/colors.min.css' %}" rel="stylesheet" type="text/css" />
    <!-- /global stylesheets -->

    <!-- Core JS files -->
    <script src="{% static 'admin/js/main/jquery.min.js' %}"></script>
    <script src="{% static 'admin/js/main/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'admin/js/plugins/loaders/blockui.min.js' %}"></script>
    <script src="{% static 'admin/js/plugins/ui/ripple.min.js' %}"></script>
    <!-- /core JS files -->

    <!-- Theme JS files -->
    <script src="{% static 'admin/js/plugins/visualization/d3/d3.min.js' %}"></script>
    <script src="{% static 'admin/js/plugins/visualization/d3/d3_tooltip.js' %}"></script>
    <script src="{% static 'admin/js/plugins/forms/styling/switchery.min.js' %}"></script>
    <script src="{% static 'admin/js/plugins/ui/moment/moment.min.js' %}"></script>
    <script src="{% static 'admin/js/plugins/pickers/daterangepicker.js' %}"></script>

    <script src="{% static 'admin/js/app.js' %}"></script>
    <script src="{% static 'admin/js/demo_pages/dashboard.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/streamgraph.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/sparklines.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/lines.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/areas.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/donuts.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/bars.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/progress.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/heatmaps.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/pies.js' %}"></script>
    <script src="{% static 'admin/js/demo_charts/pages/dashboard/light/bullets.js' %}"></script>
    <!-- /theme JS files -->
  </head>

  <body class="navbar-top">
    <!-- Main navbar -->
    <div class="navbar navbar-expand-md navbar-dark bg-indigo fixed-top">
      <div class="navbar-brand">
        <a href="index.html" class="d-inline-block"><img src="/static/images/logo_light.png" alt="" /></a>
      </div>

      <div class="d-md-none">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbar-mobile"><i class="icon-tree5"></i></button>
        <button class="navbar-toggler sidebar-mobile-main-toggle" type="button"><i class="icon-paragraph-justify3"></i></button>
      </div>

      <div class="collapse navbar-collapse" id="navbar-mobile">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="#" class="navbar-nav-link sidebar-control sidebar-main-toggle d-none d-md-block"><i class="icon-paragraph-justify3"></i></a>
          </li>
        </ul>

        <ul class="navbar-nav ml-md-auto">
          <li class="nav-item">
            <a href="{% url 'logout' %}" class="navbar-nav-link">
              <i class="icon-switch2"></i>
              <span class="d-md-none ml-2">Logout</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
    <!-- /main navbar -->

    <!-- Page content -->

    <div class="page-content">
      <!-- Include base.html -->
      {% include 'admin/sidebar.html' %}
      {% block content %}

      {% endblock %}
      <!-- Main content -->
    </div>

    <!-- /page content -->
  </body>
</html>
