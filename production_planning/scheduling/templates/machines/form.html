{% extends 'admin/base.html' %}

{% block content %}
  <div class="content-wrapper">
    <!-- Page header -->
    <div class="page-header page-header-light">
      <div class="page-header-content header-elements-md-inline">
        <div class="page-title d-flex">
          <h4>
            <i class="icon-arrow-left52 mr-2"></i>
            <span class="font-weight-semibold">Home</span> - MACHINE
          </h4>
          <a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
        </div>
      </div>

      <div class="breadcrumb-line breadcrumb-line-light header-elements-md-inline">
        <div class="d-flex">
          <div class="breadcrumb">
            <a href="{% url 'dashboard' %}" class="breadcrumb-item"><i class="icon-home2 mr-2"></i> Home</a>
            <a href="{% url 'machines' %}" class="breadcrumb-item">Machine</a>
            <span class="breadcrumb-item active">{% if machine.id %}Edit{% else %}Create{% endif %}</span>
          </div>
          <a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
        </div>
      </div>
    </div>

    <!-- Machine Form -->
    <div class="card mt-2">
      <div class="card-header header-elements-inline">
        <h5 class="card-title">
          {% if machine.id %}
            Edit {{ machine.name }}
          {% else %}
            Create New Machine
          {% endif %}
        </h5>
      </div>

      <div class="card-body">
        <form action="{% if machine.id %}{% url 'machine_edit' machine.id %}{% else %}{% url 'machine_create' %}{% endif %}" method="post">
          {% csrf_token %}

          <div class="form-group">
            <label>Name:</label>
            <input required type="text" class="form-control" name="name" placeholder="Machine Name" value="{{ machine.name }}" />
          </div>

          <div class="form-group">
            <label>Type:</label>
            <input required type="text" class="form-control" name="type" placeholder="Machine Type" value="{{ machine.type }}" />
          </div>

          <div class="form-group">
            <label>Capacity:</label>
            <input required type="number" class="form-control" name="capacity" placeholder="Capacity" value="{{ machine.capacity }}" />
          </div>

          <div class="form-group">
            <label>Status:</label>
            <select required class="form-control" name="status">
              <option value="available" {% if machine.status == "available" %} selected {% endif %}>Available</option>
              <option value="maintenance" {% if machine.status == "maintenance" %} selected {% endif %}>Maintenance</option>
              <option value="occupied" {% if machine.status == "occupied" %} selected {% endif %}>Occupied</option>
            </select>
          </div>

          <div class="form-group">
            <label>Max Hours Per Day:</label>
            <input required type="number" class="form-control" name="max_hours_per_day" placeholder="Max Hours Per Day" value="{{ machine.max_hours_per_day }}" />
          </div>

          <div class="form-group">
            <label>Operating Cost:</label>
            <input required type="number" class="form-control" name="operating_cost" placeholder="Operating Cost" value="{{ machine.operating_cost }}" />
          </div>

          <div class="text-right">
            <button type="submit" class="btn btn-primary">Submit form <i class="icon-paperplane ml-2"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
