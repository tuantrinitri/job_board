{% extends 'admin/base.html' %}

{% block content %}
  <div class="content-wrapper">
    <!-- Page header -->
    <div class="page-header page-header-light">
      <div class="page-header-content header-elements-md-inline">
        <div class="page-title d-flex">
          <h4>
            <i class="icon-arrow-left52 mr-2"></i>
            <span class="font-weight-semibold">Home</span> - JOB
          </h4>
          <a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
        </div>
      </div>

      <div class="breadcrumb-line breadcrumb-line-light header-elements-md-inline">
        <div class="d-flex">
          <div class="breadcrumb">
            <a href="{% url 'dashboard' %}" class="breadcrumb-item"><i class="icon-home2 mr-2"></i> Home</a>
            <a href="{% url 'jobs' %}" class="breadcrumb-item">Job</a>
            <span class="breadcrumb-item active">{% if job.id %}Edit{% else %}Create{% endif %}</span>
          </div>
          <a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
        </div>
      </div>
    </div>

    <!-- Job Form -->
    <div class="card mt-2">
      <div class="card-header header-elements-inline">
        <h5 class="card-title">
          {% if job.id %}
            Edit {{ job.name }}
          {% else %}
            Create New Job
          {% endif %}
        </h5>
      </div>

      <div class="card-body">
        <form action="{% if job.id %}{% url 'job_edit' job.id %}{% else %}{% url 'job_create' %}{% endif %}" method="post">
          {% csrf_token %}

          <div class="form-group">
            <label>Name:</label>
            <input required type="text" class="form-control" name="name" placeholder="Job Name" value="{{ job.name }}" />
          </div>

          <div class="form-group">
            <label>Product Type:</label>
            <input required type="text" class="form-control" name="product_type" placeholder="Product Type" value="{{ job.product_type }}" />
          </div>

          <div class="form-group">
            <label>Quantity:</label>
            <input required type="number" class="form-control" name="quantity" placeholder="Quantity" value="{{ job.quantity }}" />
          </div>

          <div class="form-group">
            <label>Deadline:</label>
            <input required type="datetime-local" class="form-control" name="deadline" placeholder="Deadline" value="{{ job.deadline|date:'Y-m-d\TH:i' }}" />
          </div>

          <div class="form-group">
            <label>Priority:</label>
            <select required class="form-control" name="priority">
              {% for value, display in job.PRIORITY_CHOICES %}
                <option value="{{ value }}" {% if job.priority == value %} selected {% endif %}>{{ display }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label>Required Skills:</label>
            <select required class="form-control" multiple name="required_skills">
              {% for skill in skills %}
                <option value="{{ skill.id }}" {% if skill in job.required_skills.all %} selected {% endif %}>{{ skill.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label>Required Machine Type:</label>
            <select required class="form-control" name="required_machine_type">
              {% for machine in machines %}
                <option value="{{ machine.type }}" {% if job.required_machine_type == machine.type %} selected {% endif %}>{{ machine.type }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label>Predecessor:</label>
            <select class="form-control" name="predecessor">
              <option value="">None</option>
              {% for j in jobs %}
                <option value="{{ j.id }}" {% if job.predecessor and job.predecessor.id == j.id %} selected {% endif %}>{{ j.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="text-right">
            <button type="submit" class="btn btn-primary">Submit form <i class="icon-paperplane ml-2"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
