{% extends 'admin/base.html' %}

{% block content %}
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h2 class="mb-0">Danh sách Skills</h2>
      </div>
      <div class="card-body">
        <table class="table table-hover">
          <thead class="thead-light">
            <tr>
              <th>#</th>
              <th>Tên kỹ năng</th>
              <th>Mô tả</th>
              <th class="text-center">Hành động</th>
            </tr>
          </thead>
          <tbody>
            {% for skill in skills %}
              <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ skill.name }}</td>
                <td>{{ skill.description }}</td>
                <td class="text-center">
                  <a href="{% url 'skill_edit' skill.id %}" class="btn btn-sm btn-outline-primary">Sửa</a>
                  <a href="{% url 'skill_delete' skill.id %}" class="btn btn-sm btn-outline-danger">Xóa</a>
                </td>
              </tr>
            {% empty %}
              <tr>
                <td colspan="4" class="text-center text-muted">Không có kỹ năng nào.</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
        <div class="text-right">
          <a href="{% url 'skill_create' %}" class="btn btn-success">Thêm Skill mới</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
