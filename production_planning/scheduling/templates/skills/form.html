{% extends 'admin/base.html' %}

{% block content %}
  <div class="container mt-4">
    <h2 class="text-center mb-4">Tạo hoặc Chỉnh sửa Kỹ năng</h2>
    <form method="post"
      action="{% if skill.id %}
        {% url 'skill_edit' skill.id %}
      {% else %}
        {% url 'skill_create' %}
      {% endif %}"
      class="shadow p-4 rounded bg-light">
      {% csrf_token %}
      <div class="mb-3">
        <label for="name" class="form-label fw-bold">Tên Kỹ năng</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Nhập tên kỹ năng" required />
      </div>

      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="{% url 'skills' %}" class="btn btn-secondary">Hủy</a>
      </div>
    </form>
  </div>
{% endblock %}
